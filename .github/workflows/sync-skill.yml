name: Sync SKILL.md and agents

on:
  push:
    branches: [main]
    paths:
      - skills/ieee-paper-writer/SKILL.md
      - agents/ieee-paper-*.md

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Sync ieee-paper-writer SKILL.md to plugin
        run: |
          mkdir -p plugins/ieee-paper-writer/skills/ieee-paper-writer
          cp skills/ieee-paper-writer/SKILL.md plugins/ieee-paper-writer/skills/ieee-paper-writer/SKILL.md

      - name: Sync pipeline agents to plugin
        run: |
          mkdir -p plugins/ieee-paper-writer/agents
          cp agents/ieee-paper-author.md    plugins/ieee-paper-writer/agents/ieee-paper-author.md
          cp agents/ieee-paper-editorial.md plugins/ieee-paper-writer/agents/ieee-paper-editorial.md
          cp agents/ieee-paper-style.md     plugins/ieee-paper-writer/agents/ieee-paper-style.md
          cp agents/ieee-paper-reviewer.md  plugins/ieee-paper-writer/agents/ieee-paper-reviewer.md

      - name: Rebuild ieee-paper-writer.skill ZIP
        run: mkdir -p dist && cd skills && zip -r ../dist/ieee-paper-writer.skill ieee-paper-writer/

      - name: Commit and push if changed
        run: |
          git add \
            plugins/ieee-paper-writer/skills/ieee-paper-writer/SKILL.md \
            plugins/ieee-paper-writer/agents/ieee-paper-author.md \
            plugins/ieee-paper-writer/agents/ieee-paper-editorial.md \
            plugins/ieee-paper-writer/agents/ieee-paper-style.md \
            plugins/ieee-paper-writer/agents/ieee-paper-reviewer.md \
            dist/ieee-paper-writer.skill
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync SKILL.md and agents [skip ci]"
          git push

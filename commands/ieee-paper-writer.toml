description = "Write or review a scientific paper section in IEEE style (4-agent pipeline: Author → Editorial → IEEE Style → Reviewer)"
prompt = "Run the ieee-paper-writer pipeline on the following input. Pipeline stages: (1) Author Agent — writes complete technical draft; (2) Editorial Flow Analyzer — fluency, rhythm, connectors; (3) IEEE Style Agent — impersonality, voice, acronyms, forbidden constructions; (4) Reviewer Agent — anonymous peer review. Return: Final Text + Style Notes + Reviewer Report. Manuscript always in English. If no input provided, ask the user what section or content to write or review. {{args}}"
